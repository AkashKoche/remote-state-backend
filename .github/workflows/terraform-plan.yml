name: terraform-plan
on:
  pull_request:
    paths:
      - "**.tf"
      - ".github/workflows/terraform-*.yml"

permissions:
  id-tokens: write
  contents: read
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789:role/github-actions-terraform
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: terraform fmt
        run: terraform fmt -check -recursive
        working-directory: live

      - name: terraform init
        run: |
          terraform init \
            -backend-config="bucket=tf-shared-state-123456789" \
            -backend-config="key=${{ github.event/repository.name }}/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=tf-shared-lock" \
            -backend-config="encrypt=true"
        working-directory: live

      - name: terraform validate
        run: terraform validate -no-color
        working-directory: live

      - name: tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
      - run: tflint --init && tflint --recursive
        working-directory: live

      - name: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: live
          framework: terraform

      - name: terraform plan
        id: plan
        run: terraform plan -no-color -input=false -out=tfplan
        working-directory: live

      - name: Post Plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const output = '#### Terraform Plan
            \'\'\'
            ${{ steps.plan.outputs.stdout }}
            \'\'\'
            ';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
